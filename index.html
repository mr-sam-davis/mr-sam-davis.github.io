<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="utf-8">
  <title>Sam Davis</title>
  <meta name="description" content="Sam Davis — iOS developer, app maker.">
  <meta name="author" content="Sam Davis">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="css/normalize.css">
  <link rel="stylesheet" href="css/style.css">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="images/favicon.png">

</head>
<body>

  <div class="layout">

    <!-- LEFT PANEL: photo -->
    <div class="panel panel--photo" aria-hidden="true">
      <div class="photo-frame">
        <img
          src="images/profile.jpg"
          alt="Sam Davis"
          class="profile-photo"
          width="340"
          height="340"
        >
      </div>
    </div>

    <!-- RIGHT PANEL: content -->
    <main class="panel panel--content">
      <div class="content-inner">
        <h1 class="name">Sam Davis</h1>
        <p class="tagline">Hey, I make apps&nbsp;:)</p>
        <p class="bio">
          Sometimes for myself, but mostly as lead iOS developer
          at <a href="https://3sidedcube.com" class="link">3 Sided Cube</a>.
        </p>
        <a href="mailto:sam@samapps.co.uk" class="btn">Get in touch</a>
      </div>
    </main>

  </div>

</body>
</html>
